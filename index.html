<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceTracker - Cloud Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; padding-bottom: 40px; color: #334155; }
        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .btn-tab.active { background-color: #f97316; color: white; border-color: #f97316; }
        .scroll-container { max-height: 320px; overflow-y: auto; padding-right: 4px; }
        .scroll-container::-webkit-scrollbar { width: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        input:focus, select:focus { border: 2px solid #f97316 !important; outline: none; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .syncing { animation: pulse 1s infinite; color: #f97316 !important; }
    </style>
</head>
<body class="p-4 flex justify-center">

    <div class="w-full max-w-md space-y-4">
        
        <header class="space-y-3">
            <div class="flex bg-white p-1 rounded-2xl border border-gray-200 shadow-sm">
                <button onclick="switchTab('home')" id="tab-btn-home" class="btn-tab active flex-1 py-2 rounded-xl font-bold text-sm transition text-gray-500">🏠 Home</button>
                <button onclick="switchTab('stats')" id="tab-btn-stats" class="btn-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500 transition">📊 Stats</button>
                <button onclick="switchTab('settings')" id="tab-btn-settings" class="btn-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500 transition">⚙️ Cat.</button>
            </div>

            <div class="card p-3 flex items-center justify-between">
                <button onclick="navigate(-1)" class="p-2 text-gray-600 font-bold">❮</button>
                <div class="text-center">
                    <h2 id="current-period-label" class="text-sm font-black uppercase tracking-tighter text-gray-800"></h2>
                    <div class="flex gap-2 justify-center mt-1 text-[10px] font-bold">
                        <button onclick="changeView('mensile')" id="v-m" class="text-gray-800">MENSILE</button>
                        <span class="text-gray-300">|</span>
                        <button onclick="changeView('annuale')" id="v-a" class="text-gray-400">ANNUALE</button>
                    </div>
                </div>
                <button onclick="navigate(1)" class="p-2 text-gray-600 font-bold">❯</button>
            </div>
        </header>

        <main id="tab-home" class="tab-content active-tab space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card p-3 bg-white border-l-4 border-green-500">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Entrate</p>
                    <h2 id="tot-entrate" class="text-base font-black text-green-600">€ 0.00</h2>
                </div>
                <div class="card p-3 bg-white border-l-4 border-red-500">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Uscite</p>
                    <h2 id="tot-uscite" class="text-base font-black text-red-600">€ 0.00</h2>
                </div>
            </div>

            <div class="card p-4 bg-orange-500 text-white text-center shadow-lg shadow-orange-100 border-none">
                <p class="text-xs font-bold uppercase opacity-90">Risparmi del Periodo</p>
                <h2 id="tot-risparmi" class="text-2xl font-black">€ 0.00</h2>
            </div>

            <div class="card p-5 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 id="form-title" class="font-bold text-gray-700 text-xs uppercase">Aggiungi Movimento</h3>
                    <button id="cancel-edit" onclick="resetForm()" class="hidden text-[10px] bg-gray-200 px-2 py-1 rounded text-gray-600 font-bold">ANNULLA</button>
                </div>
                <input type="hidden" id="edit-id">
                <div class="flex gap-2">
                    <select id="tipo" onchange="updateCategorySelect()" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none">
                        <option value="uscita">Spesa (-)</option>
                        <option value="entrata">Entrata (+)</option>
                    </select>
                    <input type="number" id="importo" placeholder="0.00" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold outline-none">
                </div>
                <select id="categoria-select" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none"></select>
                <input type="text" id="descrizione" placeholder="Descrizione (opzionale)" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none">
                <input type="date" id="data-input" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm outline-none">
                <button id="btn-save" onclick="saveTransaction()" class="w-full bg-slate-700 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition">Registra</button>
            </div>

            <div class="space-y-2">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase ml-2">Movimenti Recenti</h3>
                <div id="lista-transazioni" class="scroll-container space-y-2"></div>
            </div>
        </main>

        <main id="tab-stats" class="tab-content space-y-4">
            <div class="card p-5">
                <h3 class="text-center font-bold text-gray-600 mb-4 uppercase text-xs">Distribuzione Spese (%)</h3>
                <canvas id="expenseChart" height="300"></canvas>
            </div>
            <div id="category-breakdown" class="card p-5 space-y-3"></div>
        </main>

        <main id="tab-settings" class="tab-content space-y-4">
            <div class="card p-5">
                <h3 class="font-bold text-gray-600 text-sm mb-3 uppercase">Gestisci Categorie</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="nuova-cat-nome" placeholder="Nome..." class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                    <select id="nuova-cat-tipo" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                        <option value="uscita">Uscita</option>
                        <option value="entrata">Entrata</option>
                    </select>
                    <button onclick="addCustomCategory()" class="bg-slate-700 text-white px-4 rounded-lg font-bold">+</button>
                </div>
                <div id="categories-manage-list" class="space-y-2 max-h-60 overflow-y-auto"></div>
            </div>
        </main>

        <footer class="flex justify-center gap-4 py-4 border-t border-gray-100">
            <button onclick="exportData()" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest hover:text-slate-600">Esporta</button>
            <span class="text-gray-200">|</span>
            <button id="sync-btn" onclick="backupSuDrive()" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest hover:text-orange-500">Sincronizza</button>
            <span class="text-gray-200">|</span>
            <label class="text-[10px] text-gray-400 font-bold uppercase tracking-widest cursor-pointer hover:text-slate-600">
                Importa
                <input type="file" id="importFile" class="hidden" onchange="importData(event)">
            </label>
        </footer>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTs_GmK7fryqr_XFBn-Q9kFq6dqlw2AK1ALe_9xpXeDI6OcaaTXoIJJUivw3DUYy2cCg/exec";

        let transazioni = [];
        let categorie = {
            uscita: ['🛒 Cibo', '🚗 Trasporti', '🏠 Casa', '🍕 Svago', '💊 Salute'],
            entrata: ['💰 Stipendio', '📈 Investimenti', '🎁 Regalo']
        };
        let viewType = 'mensile';
        let currentDate = new Date();
        let chart;

        // --- SINCRONIZZAZIONE CLOUD ---
        async function caricaDaDrive() {
            const btn = document.getElementById('sync-btn');
            btn.classList.add('syncing');
            btn.innerText = "Caricamento...";

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                
                if (data && data.transazioni) {
                    transazioni = data.transazioni;
                    categorie = data.categorie;
                    localStorage.setItem('finanze_v5', JSON.stringify(transazioni));
                    localStorage.setItem('categorie_v5', JSON.stringify(categorie));
                    console.log("Dati caricati da Drive con successo");
                }
            } catch (e) {
                console.error("Errore Cloud, uso dati locali:", e);
                transazioni = JSON.parse(localStorage.getItem('finanze_v5')) || [];
                categorie = JSON.parse(localStorage.getItem('categorie_v5')) || categorie;
            } finally {
                btn.classList.remove('syncing');
                btn.innerText = "Sincronizzato";
                render();
                setTimeout(() => btn.innerText = "Sincronizza", 2000);
            }
        }

        async function backupSuDrive() {
            const btn = document.getElementById('sync-btn');
            btn.classList.add('syncing');
            btn.innerText = "Salvataggio...";

            const payload = {
                contenuto: JSON.stringify({ transazioni, categorie }, null, 2)
            };

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                setTimeout(() => {
                    btn.classList.remove('syncing');
                    btn.innerText = "✅ Salvato";
                    setTimeout(() => btn.innerText = "Sincronizza", 2000);
                }, 800);
            } catch (e) {
                console.error(e);
                btn.innerText = "Errore!";
                btn.classList.remove('syncing');
            }
        }

        // --- LOGICA APP ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active-tab'));
            document.querySelectorAll('.btn-tab').forEach(el => {
                el.classList.remove('active', 'text-white');
                el.classList.add('text-gray-500');
            });
            document.getElementById('tab-' + tab).classList.add('active-tab');
            const btn = document.getElementById('tab-btn-' + tab);
            btn.classList.add('active');
            btn.classList.remove('text-gray-500');
            render();
        }

        function updateCategorySelect() {
            const tipo = document.getElementById('tipo').value;
            const select = document.getElementById('categoria-select');
            select.innerHTML = (categorie[tipo] || []).map(c => `<option value="${c}">${c}</option>`).join('');
        }

        function saveTransaction() {
            const id = document.getElementById('edit-id').value;
            const importo = parseFloat(document.getElementById('importo').value);
            const tipo = document.getElementById('tipo').value;
            const categoria = document.getElementById('categoria-select').value;
            const descrizione = document.getElementById('descrizione').value.trim();
            const data = document.getElementById('data-input').value;

            if(!importo || !data) return alert("Inserisci importo e data");

            if(id) {
                const index = transazioni.findIndex(t => t.id == id);
                transazioni[index] = { ...transazioni[index], importo, tipo, categoria, descrizione, data };
            } else {
                transazioni.push({ id: Date.now(), importo, tipo, categoria, descrizione, data });
            }

            localStorage.setItem('finanze_v5', JSON.stringify(transazioni));
            resetForm();
            render();
            backupSuDrive(); 
        }

        function render() {
            const label = document.getElementById('current-period-label');
            label.innerText = currentDate.toLocaleDateString('it-IT', viewType === 'mensile' ? {month:'long', year:'numeric'} : {year:'numeric'});

            updateCategorySelect();
            
            const catList = document.getElementById('categories-manage-list');
            catList.innerHTML = '';
            ['uscita', 'entrata'].forEach(t => {
                (categorie[t] || []).forEach((c, idx) => {
                    catList.innerHTML += `<div class="flex justify-between items-center text-xs bg-white p-2 rounded border border-gray-100 shadow-sm">
                        <span>${t === 'entrata' ? '🟢' : '🔴'} ${c}</span>
                        <button onclick="deleteCategory('${t}', ${idx})" class="text-gray-400 hover:text-red-500 font-bold">✕</button>
                    </div>`;
                });
            });

            const filtrati = transazioni.filter(t => {
                const d = new Date(t.data);
                return viewType === 'mensile' ? (d.getMonth() === currentDate.getMonth() && d.getFullYear() === currentDate.getFullYear()) : (d.getFullYear() === currentDate.getFullYear());
            });

            let ent = 0, usc = 0;
            const stats = {};
            const list = document.getElementById('lista-transazioni');
            list.innerHTML = '';

            filtrati.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(t => {
                if(t.tipo === 'entrata') ent += t.importo;
                else {
                    usc += t.importo;
                    stats[t.categoria] = (stats[t.categoria] || 0) + t.importo;
                }
                const item = document.createElement('div');
                item.onclick = () => editTrans(t.id);
                item.className = "card p-3 flex justify-between items-center text-sm cursor-pointer hover:bg-gray-50 transition border-l-4 " + (t.tipo === 'entrata' ? 'border-green-500' : 'border-red-500');
                item.innerHTML = `
                    <div class="overflow-hidden">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">${t.data}</p>
                        <p class="font-bold text-gray-700">${t.categoria}</p>
                        <p class="text-[11px] text-gray-500 truncate italic">${t.descrizione || ''}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="${t.tipo === 'entrata' ? 'text-green-600' : 'text-red-600'} font-black">€${t.importo.toFixed(2)}</span>
                    </div>`;
                list.appendChild(item);
            });

            document.getElementById('tot-entrate').innerText = `€ ${ent.toFixed(2)}`;
            document.getElementById('tot-uscite').innerText = `€ ${usc.toFixed(2)}`;
            document.getElementById('tot-risparmi').innerText = `€ ${(ent - usc).toFixed(2)}`;

            updateChart(stats, usc);
            renderStatsDetails(stats, usc);
        }

        // Funzioni helper rimosse dal corpo principale per brevità ma necessarie
        function editTrans(id) {
            const t = transazioni.find(item => item.id === id);
            document.getElementById('edit-id').value = t.id;
            document.getElementById('tipo').value = t.tipo;
            updateCategorySelect();
            document.getElementById('categoria-select').value = t.categoria;
            document.getElementById('importo').value = t.importo;
            document.getElementById('descrizione').value = t.descrizione || '';
            document.getElementById('data-input').value = t.data;
            document.getElementById('form-title').innerText = "Modifica Movimento";
            document.getElementById('btn-save').innerText = "Aggiorna";
            document.getElementById('cancel-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('importo').value = '';
            document.getElementById('descrizione').value = '';
            document.getElementById('data-input').valueAsDate = new Date();
            document.getElementById('form-title').innerText = "Aggiungi Movimento";
            document.getElementById('btn-save').innerText = "Registra";
            document.getElementById('cancel-edit').classList.add('hidden');
        }

        function updateChart(stats, total) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(chart) chart.destroy();
            const keys = Object.keys(stats);
            if(keys.length === 0) return;
            chart = new Chart(ctx, {
                type: 'pie',
                data: { labels: keys.map(k => `${k} (${((stats[k]/total)*100).toFixed(1)}%)`), datasets: [{ data: Object.values(stats), backgroundColor: ['#f97316', '#3b82f6', '#10b981', '#8b5cf6', '#ef4444', '#eab308', '#06b6d4'] }] },
                options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: {size: 11} } } } }
            });
        }

        function renderStatsDetails(stats, total) {
            const container = document.getElementById('category-breakdown');
            container.innerHTML = '<h3 class="text-xs font-bold text-gray-400 uppercase border-b border-gray-100 pb-2">Analisi Spese</h3>';
            if(total === 0) return container.innerHTML += '<p class="text-center text-gray-400 py-4 text-sm">Nessuna spesa</p>';
            for(let c in stats) {
                let p = ((stats[c]/total)*100).toFixed(1);
                container.innerHTML += `<div class="space-y-1"><div class="flex justify-between text-xs"><span>${c}</span><span class="font-bold">€${stats[c].toFixed(2)}</span></div><div class="w-full bg-gray-100 h-1.5 rounded-full"><div class="bg-orange-500 h-1.5 rounded-full" style="width:${p}%"></div></div></div>`;
            }
        }

        function deleteCategory(tipo, index) { if(confirm("Eliminare?")) { categorie[tipo].splice(index, 1); localStorage.setItem('categorie_v5', JSON.stringify(categorie)); render(); backupSuDrive(); } }
        function addCustomCategory() { const n = document.getElementById('nuova-cat-nome').value.trim(); const t = document.getElementById('nuova-cat-tipo').value; if(n) { categorie[t].push(n); localStorage.setItem('categorie_v5', JSON.stringify(categorie)); render(); backupSuDrive(); } document.getElementById('nuova-cat-nome').value = ''; }
        function navigate(dir) { if (viewType === 'mensile') currentDate.setMonth(currentDate.getMonth() + dir); else currentDate.setFullYear(currentDate.getFullYear() + dir); render(); }
        function changeView(v) { viewType = v; render(); }

        function exportData() {
            const blob = new Blob([JSON.stringify({transazioni, categorie})], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `finance_backup.json`; a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imported = JSON.parse(e.target.result);
                if(confirm("Sovrascrivere i dati con il file importato?")) {
                    transazioni = imported.transazioni; categorie = imported.categorie;
                    render(); backupSuDrive();
                }
            };
            reader.readAsText(event.target.files[0]);
        }

        // --- AVVIO AUTOMATICO ---
        window.onload = caricaDaDrive;
        document.getElementById('data-input').valueAsDate = new Date();
    </script>
</body>
</html>
