<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanceTracker Pro</title>
    
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanze">
    <link rel="icon" type="image/png" href="icona.png?v=2">
    <link rel="apple-touch-icon" href="icona.png?v=2">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 flex justify-center">

    <!-- Schermata Autenticazione Firebase -->
    <div id="auth-container">
        <div class="auth-card">
            <h1 class="text-2xl font-black text-slate-800 mb-2 uppercase tracking-tighter">FinanceTracker ✨</h1>
            <p class="text-xs text-gray-500 mb-6 uppercase font-bold tracking-widest">Sincronizzazione Cloud Attiva</p>
            
            <input type="email" id="auth-email" class="auth-input" placeholder="Il tuo indirizzo email">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password (min. 6 caratteri)">
            
            <button id="btn-login" class="auth-btn mt-2 hover:bg-orange-600 transition">ACCEDI AL CLOUD</button>
            <button id="btn-signup" class="auth-btn auth-btn-alt hover:bg-slate-700 transition">CREA NUOVO ACCOUNT</button>
            
            <p id="auth-error" class="text-xs text-red-500 mt-4 font-bold hidden"></p>
        </div>
    </div>

    <!-- Web App Principale Gated (Nascosta all'avvio) -->
    <div id="app-container" class="w-full max-w-md space-y-4 hidden-app">
        
        <header class="space-y-3">
            <div class="flex bg-white p-1 rounded-2xl border border-gray-200 shadow-sm">
                <button onclick="window.switchTab('home')" id="tab-btn-home" class="btn-tab active flex-[2] py-2 rounded-xl font-bold text-sm transition text-gray-500">🏠 Home</button>
                <button onclick="window.switchTab('stats')" id="tab-btn-stats" class="btn-tab flex-[2] py-2 rounded-xl font-bold text-sm text-gray-500 transition">📊 Stats</button>
                <button onclick="window.switchTab('settings')" id="tab-btn-settings" class="btn-tab flex-1 py-2 rounded-xl font-bold text-sm text-gray-500 transition">⚙️</button>
            </div>

            <div class="card p-3 flex items-center justify-between">
                <button onclick="window.navigate(-1)" class="p-2 text-gray-600 font-bold hover:text-orange-500">❮</button>
                <div class="text-center">
                    <h2 id="current-period-label" class="text-sm font-black uppercase tracking-tighter text-gray-800"></h2>
                    <div class="flex gap-2 justify-center mt-1 text-[10px] font-bold">
                        <button onclick="window.changeView('mensile')" id="v-m" class="text-gray-800">MENSILE</button>
                        <span class="text-gray-300">|</span>
                        <button onclick="window.changeView('annuale')" id="v-a" class="text-gray-400">ANNUALE</button>
                    </div>
                </div>
                <button onclick="window.navigate(1)" class="p-2 text-gray-600 font-bold hover:text-orange-500">❯</button>
            </div>
        </header>

        <main id="tab-home" class="tab-content active-tab space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <div class="card p-3 border-l-4 border-green-500">
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Entrate</p>
                    <h2 id="tot-entrate" class="text-base font-black text-green-600">€ 0.00</h2>
                </div>
                <div class="card p-3 border-l-4 border-red-500">
                    <p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Uscite</p>
                    <h2 id="tot-uscite" class="text-base font-black text-red-600">€ 0.00</h2>
                </div>
            </div>

            <div class="card p-4 bg-orange-500 text-white text-center shadow-lg shadow-orange-100 border-none relative overflow-hidden">
                <p class="text-xs font-bold uppercase opacity-90 tracking-widest">Risparmi del Periodo</p>
                <h2 id="tot-risparmi" class="text-2xl font-black">€ 0.00</h2>
            </div>

            <div class="card p-5 space-y-3 relative shadow-sm">
                <div class="flex justify-between items-center">
                    <h3 id="form-title" class="font-bold text-gray-700 text-xs uppercase">Aggiungi Movimento</h3>
                    <div id="btn-container-edit" class="hidden flex gap-1">
                        <button onclick="window.deleteTransaction()" class="text-[10px] bg-red-100 px-2 py-1 rounded text-red-600 font-bold hover:bg-red-200 transition">ELIMINA</button>
                        <button onclick="window.resetForm()" class="text-[10px] bg-gray-200 px-2 py-1 rounded text-gray-600 font-bold hover:bg-gray-300 transition">ANNULLA</button>
                    </div>
                </div>
                <input type="hidden" id="edit-id">
                <div class="flex gap-2">
                    <select id="tipo" onchange="window.updateCategorySelect()" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm">
                        <option value="uscita">Spesa (-)</option>
                        <option value="entrata">Entrata (+)</option>
                    </select>
                    <input type="number" id="importo" inputmode="decimal" placeholder="0.00" class="flex-1 p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm font-bold w-full">
                </div>
                <select id="categoria-select" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm"></select>
                <input type="text" id="descrizione" placeholder="Descrizione (es. Pizza)" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm">
                <input type="date" id="data-input" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl text-sm">
                <button id="btn-save" onclick="window.saveTransaction()" class="w-full bg-slate-700 text-white py-4 rounded-xl font-bold hover:bg-slate-800 transition shadow-md">Registra</button>
            </div>

            <div class="space-y-2">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase ml-2 tracking-widest">Movimenti Recenti</h3>
                <div id="lista-transazioni" class="scroll-container space-y-2"></div>
            </div>
        </main>

        <main id="tab-stats" class="tab-content space-y-4">
            <div class="card p-5">
                <h3 class="text-center font-bold text-gray-600 mb-4 uppercase text-[10px] tracking-widest">Distribuzione Spese</h3>
                <div class="chart-wrapper">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
            <div id="category-breakdown" class="card p-5 space-y-3"></div>
        </main>

        <main id="tab-settings" class="tab-content space-y-4">
            
            <div class="card p-5 space-y-3 border-t-4 border-orange-500 shadow-sm">
                <h3 class="font-bold text-gray-700 text-[10px] uppercase tracking-wider">☁️ Account Firebase</h3>
                <div class="space-y-4">
                    <p class="text-sm font-medium text-gray-600 bg-gray-50 p-2 rounded-lg border border-gray-100 flex items-center justify-between">
                        <span id="profile-email">utente...</span>
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    </p>
                    <p id="cloud-status" class="text-[9px] text-center text-gray-400 font-medium">Sincronizzazione attiva ✔️</p>
                    <button onclick="window.authLogout()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold text-[10px] uppercase transition hover:bg-slate-200">
                        Disconnetti Account
                    </button>
                </div>
            </div>

            <div class="card p-5 space-y-3 shadow-sm">
                <h3 class="font-bold text-gray-700 text-[10px] uppercase tracking-wider">💾 Backup Manuale (File)</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.exportData()" class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-gray-200 transition">Esporta JSON</button>
                    <label class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold text-[10px] uppercase hover:bg-gray-200 text-center cursor-pointer transition">
                        Importa JSON
                        <input type="file" id="importFile" class="hidden" onchange="window.importData(event)" accept=".json">
                    </label>
                </div>
            </div>

            <div class="card p-5 shadow-sm">
                <h3 class="font-bold text-gray-700 text-[10px] mb-3 uppercase tracking-wider">📂 Gestisci Categorie</h3>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="nuova-cat-nome" placeholder="Nuova categoria..." class="flex-1 p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                    <select id="nuova-cat-tipo" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm">
                        <option value="uscita">Uscita</option>
                        <option value="entrata">Entrata</option>
                    </select>
                    <button onclick="window.addCustomCategory()" class="bg-slate-700 text-white px-4 rounded-lg font-bold hover:bg-slate-800 transition">+</button>
                </div>
                <div id="categories-manage-list" class="space-y-2 max-h-40 overflow-y-auto"></div>
            </div>
            
        </main>
    </div>

    <!-- Firebase Compat Libraries per compatibilità con l'apertura Web App offline (doppio clic) -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
